# Stage E deploy-infra — the daily data refresh. Runs the finder for BOTH
# cities, gates on the full smoke suite, then opens an AUTOMATED PR (ruling:
# never a direct push of data to main — a human one-click-merges, and that
# merge push triggers deploy.yml, so fresh data reaches Pages with a human in
# the loop). If tests fail, this workflow fails loudly and opens nothing.
#
# Honesty constraints (binding):
# - no secrets anywhere: every source the finder pulls is public; the
#   GITHUB_TOKEN used for the PR is the runner's own.
# - events refresh daily; place facts refresh weekly or by explicit manual
#   request. Place enrichment is cache-only in verified-source mode, so CI
#   never invents or unsupervisedly acquires new imagery.
name: Daily data refresh

on:
  schedule:
    # 09:23 UTC daily (~4–5am ET), off the :00 scheduler stampede. The event
    # artifact contract expires at 48 hours, so a weekly run could never keep
    # production truthfully actionable even when every run succeeded.
    - cron: '23 9 * * *'
  workflow_dispatch:
    inputs:
      refresh_places:
        description: Refresh both cities' place sources live (required for the first verified bootstrap)
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      # root deps: playwright (render.mjs — Tampa's render-scraped sources).
      # app deps: npm test builds + lints the app as part of the gate.
      - name: Install dependencies (both roots)
        run: |
          npm ci
          npm --prefix app ci

      # Verified publication requires Tampa's rendered source to be acquired
      # live. Browser installation is therefore fatal, never a degraded skip.
      - name: Install Playwright Chromium (Tampa render sources)
        run: npx playwright install --with-deps chromium

      - name: Select place-refresh cadence
        id: cadence
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_REFRESH_PLACES: ${{ inputs.refresh_places }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REFRESH_PLACES="${MANUAL_REFRESH_PLACES:-true}"
          elif [ "$(date -u +%u)" = "4" ]; then
            REFRESH_PLACES=true
          else
            REFRESH_PLACES=false
          fi
          echo "refresh_places=$REFRESH_PLACES" >> "$GITHUB_OUTPUT"
          echo "Places refresh selected: $REFRESH_PLACES"

      - name: Finder — Tampa Bay (full)
        shell: bash # explicit: gives -o pipefail, so a finder failure survives the tee
        env:
          REQUIRE_LIVE_SOURCES: '1'
        run: |
          CITY=tampa-bay node finder/finder.mjs | tee "$RUNNER_TEMP/tampa.log"

      - name: Places — Tampa Bay (weekly/manual live facts, cached enrichment)
        if: steps.cadence.outputs.refresh_places == 'true'
        shell: bash # explicit: gives -o pipefail, so benchmark evidence cannot mask a place-run failure
        env:
          REQUIRE_LIVE_SOURCES: '1'
        run: CITY=tampa-bay node finder/places.mjs | tee "$RUNNER_TEMP/tampa-places.log"

      - name: Archive Tampa signal snapshot
        run: CITY=tampa-bay node finder/archive-signals.mjs

      - name: Finder — SF & East Bay (standard)
        shell: bash
        env:
          REQUIRE_LIVE_SOURCES: '1'
        run: CITY=sf-east-bay node finder/finder.mjs | tee "$RUNNER_TEMP/sf.log"

      - name: Places — SF & East Bay (weekly/manual live facts, cached enrichment)
        if: steps.cadence.outputs.refresh_places == 'true'
        shell: bash
        env:
          REQUIRE_LIVE_SOURCES: '1'
        run: CITY=sf-east-bay node finder/places.mjs | tee "$RUNNER_TEMP/sf-places.log"

      - name: Archive SF & East Bay signal snapshot
        run: CITY=sf-east-bay node finder/archive-signals.mjs

      - name: Publish bounded refresh evidence
        if: always()
        shell: bash
        env:
          REFRESH_PLACES: ${{ steps.cadence.outputs.refresh_places }}
        run: |
          set +e
          node shared/refresh-report.mjs \
            "$REFRESH_PLACES" \
            "$RUNNER_TEMP/tampa.log" \
            "$RUNNER_TEMP/sf.log" \
            "$RUNNER_TEMP/tampa-places.log" \
            "$RUNNER_TEMP/sf-places.log" \
            > "$RUNNER_TEMP/refresh-report.md"
          REPORT_STATUS=$?
          set -e
          if [ -s "$RUNNER_TEMP/refresh-report.md" ]; then
            cat "$RUNNER_TEMP/refresh-report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Refresh evidence unavailable" >> "$GITHUB_STEP_SUMMARY"
            echo "The artifact/log receipt could not be validated; this run cannot publish a data PR." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$REPORT_STATUS" -ne 0 ]; then
            echo "Refresh evidence is blocked; refusing to publish a data PR." >> "$GITHUB_STEP_SUMMARY"
            exit "$REPORT_STATUS"
          fi

      # sync the committed deployment copy to the fresh Tampa artifacts through
      # the ONE sanctioned writer of app/public (D-DEP/D1 — never a direct cp).
      - name: Strictly stage Tampa artifacts into app/public
        env:
          REQUIRE_FRESH_ARTIFACTS: '1'
          REQUIRE_VERIFIED_SOURCES: '1'
        run: CITY=tampa-bay node finder/deploy.mjs

      - name: Strictly verify SF & East Bay deployment bytes
        env:
          REQUIRE_FRESH_ARTIFACTS: '1'
          REQUIRE_VERIFIED_SOURCES: '1'
        run: |
          mkdir -p "$RUNNER_TEMP/sf-public"
          CITY=sf-east-bay DEPLOY_DEST="$RUNNER_TEMP/sf-public" node finder/deploy.mjs

      # THE GATE: the full smoke suite (finder fast-mode benchmarks, data
      # invariants on the refreshed dataset, app build + lint, base-path pins).
      # A failure fails this workflow loudly, with the log — and no PR opens.
      - name: Gate — npm test
        run: npm test

      - name: Open the data-refresh PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::main advanced during refresh; refusing to publish artifacts from a stale parent"
            exit 1
          fi
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No data changes today — nothing to PR."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="bot/data-refresh"
          git switch -c "$BRANCH"
          # scoped add — data artifacts and source caches ONLY (never -A):
          # anything else changing here would mean the refresh overstepped.
          git add finder/output finder/cache finder/history app/public
          git commit -m "Data refresh: finder run for tampa-bay + sf-east-bay ($(date -u +%Y-%m-%d))"
          git push -u origin "$BRANCH" --force
          {
            cat "$RUNNER_TEMP/refresh-report.md"
            echo
            echo "Merging this PR triggers the strict Pages deploy and postdeploy composed-site attestation."
          } > "$RUNNER_TEMP/pr-body.md"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            gh pr edit "$BRANCH" \
              --title "Data refresh: $(date -u +%Y-%m-%d) (tampa-bay + sf-east-bay)" \
              --body-file "$RUNNER_TEMP/pr-body.md"
            echo "Updated the existing open data-refresh PR."
          else
            gh pr create \
              --title "Data refresh: $(date -u +%Y-%m-%d) (tampa-bay + sf-east-bay)" \
              --body-file "$RUNNER_TEMP/pr-body.md" \
              --base main --head "$BRANCH"
          fi
