# Stage E deploy-infra — the GitHub Pages deploy (ruling: deploy = GitHub Pages,
# repo joshuaallanmorgan-lgtm/wuzup). Topology: TWO self-contained builds, one
# deployment per city (D-DEP) — Tampa at the project-site root (/wuzup/), SF as
# its own complete standalone build at /wuzup/sf/. No runtime city switching:
# each build carries its own data, manifest, icons, and BASE_PATH.
#
# The per-city loop below is the EXACT sequence verified locally (stage → build
# → collect; both halves pass a Playwright probe served under their literal
# subpaths). What only the first real CI run can prove: Pages enablement
# (Settings → Pages → Source: GitHub Actions — the LEAD does that post-merge)
# and the runner environment itself.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# one Pages deploy at a time; never cancel an in-flight production deploy
# (the standard actions/deploy-pages guidance) — a queued newer run follows.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse non-main deployment refs
        shell: bash
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Pages deploys are restricted to refs/heads/main (got $GITHUB_REF)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Verify exact deployment commit
        shell: bash
        run: |
          if [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]; then
            echo "::error::checkout does not match GITHUB_SHA"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      # app deps only: finder/deploy.mjs (the data-staging step) is
      # dependency-free by design (node builtins + the city registry), so the
      # root install (playwright/sharp — heavy, native) is not needed to deploy.
      - name: Install app dependencies
        run: npm --prefix app ci

      # BASE_PATH derives from the repo name — a rename keeps the site working
      # without touching this file ('/wuzup/' today).
      - name: Stage + build Tampa Bay (site root)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          REQUIRE_FRESH_ARTIFACTS=1 REQUIRE_VERIFIED_SOURCES=1 CITY=tampa-bay node finder/deploy.mjs
          VITE_CITY=tampa-bay BASE_PATH="/${REPO_NAME}/" WUZUP_PRODUCT_ROOT="/${REPO_NAME}/" npm --prefix app run build
          CITY=tampa-bay node finder/verify-app-build.mjs app/dist
          mkdir -p _site
          cp -r app/dist/. _site/

      # deploy.mjs re-stages app/public with SF's artifact set (mirrored
      # place-img and all — ephemeral in CI, exactly what it exists for), then
      # the second build ships it under sf/.
      - name: Stage + build SF & East Bay (site /sf/)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          REQUIRE_FRESH_ARTIFACTS=1 REQUIRE_VERIFIED_SOURCES=1 CITY=sf-east-bay node finder/deploy.mjs
          VITE_CITY=sf-east-bay BASE_PATH="/${REPO_NAME}/sf/" WUZUP_PRODUCT_ROOT="/${REPO_NAME}/" npm --prefix app run build
          CITY=sf-east-bay node finder/verify-app-build.mjs app/dist
          mkdir -p _site/sf
          cp -r app/dist/. _site/sf/

      # .nojekyll: Pages must serve the tree verbatim (no Jekyll pass — it
      # would drop dotfiles and anything it can't parse).
      - name: Assemble the Pages artifact
        run: touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Sprint 11 observes the participant-facing deployment after Pages reports
  # success. Publication integrity and beta policy remain separate: exact
  # remote bytes may be observed while stale/unhealthy data still blocks the
  # release kit. Any remote mismatch emits no deploy binding and fails loudly.
  attest:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install observer dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Install observer Chromium
        run: npx playwright install --with-deps chromium

      - name: Observe participant-facing release bytes
        shell: bash
        run: |
          set -o pipefail
          PRODUCT_ROOT="${{ needs.deploy.outputs.page_url }}"
          if [ -z "$PRODUCT_ROOT" ]; then
            echo "::error::Pages deployment did not emit a participant-facing URL"
            exit 1
          fi
          node shared/beta-production-observation.mjs "$PRODUCT_ROOT" \
            | tee "$RUNNER_TEMP/s11-production-attestation.json"

      - name: Publish attestation summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Sprint 11 participant-facing release attestation'
            echo
            if [ -s "$RUNNER_TEMP/s11-production-attestation.json" ]; then
              echo '```json'
              cat "$RUNNER_TEMP/s11-production-attestation.json"
              echo '```'
            else
              echo 'No release identity was emitted; inspect the failed observation step.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Retain participant-facing attestation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s11-production-attestation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/s11-production-attestation.json
          if-no-files-found: warn
          retention-days: 90
