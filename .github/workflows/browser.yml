name: Two-city browser journey

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composed-journey:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          npm ci
          npm --prefix app ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run composed production journey
        run: npm run test:browser

      - name: Run Sprint 9 durable-route journey
        run: npm run test:browser-s9

      - name: Run Sprint 10 responsive-accessibility journey
        run: npm run test:browser-s10
